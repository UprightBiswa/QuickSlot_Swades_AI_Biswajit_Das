name: quick_slot
description: QuickSlot, a premium sports venue booking application. The design follows Material 3 principles with a focus on clean hierarchy, modern card layouts, and intuitive interaction states.

Key Features Delivered:
Design System: A robust system named &quot;Agile Athlete&quot; using a primary blue (#2563EB) and secondary green (#10B981) palette, featuring Inter typography and 16-20px rounded corners for a startup-quality feel.
Login Flow: A welcoming entry screen with user selection and brand-aligned branding.
Venue Discovery: A comprehensive list view featuring detailed cards with ratings, availability counts, and sports-specific tagging.
Detailed Booking: A venue detail screen with a horizontal date picker and a smart slot grid highlighting Available, Booked, and Selected states.
Booking Management: A dedicated &quot;My Bookings&quot; screen for tracking upcoming games and a celebratory &quot;Booking Success&quot; state.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_riverpod: ^3.2.1

  # Backend – Firebase

  # Backend – Supabase

  # Backend – Appwrite

  # Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media
  image_picker: ^1.2.1
  file_picker: ^10.3.10

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  geolocator: ^14.0.2

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0


  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.12.2
  hive_ce_generator: ^1.11.1

dependency_overrides:
  # Riverpod 3.x requires a newer test_api than what Flutter SDK pins.
  # This override allows resolution while remaining compatible with flutter_test.
  test_api: 0.7.6

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env

